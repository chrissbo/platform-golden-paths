# Dependabot config for platform-golden-paths.
# Bumps the actions used inside the reusable workflows.
# Phase 1.5 of the local pipeline simulation.

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    # Group minor + patch bumps into a single PR per week so Layer A
    # auto-merge has something coherent to act on. Major bumps stay in
    # their own PRs (default behaviour) — those need human review.
    groups:
      ci-actions-minor:
        update-types:
          - "minor"
          - "patch"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
