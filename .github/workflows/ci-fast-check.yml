# Pipeline 1 — Developer Fast-Check (<3 min budget).
#
# Purpose: catch the 80% of obvious defects before deeper gates run.
# Runs on every push and on every PR. Cancelled in flight on new pushes.
#
# Stages:
#   - format/lint    golangci-lint v2 with the centrally pinned config.
#   - secrets        gitleaks against the diff.
#   - tests          short race-detected unit tests.
#   - build          `go build ./...` (smoke; no image push).
#
# Mirrors research/cicd-toolchain/pipeline-architecture.md §"Pipeline 1".
# Consumed by service repos via:
#
#   jobs:
#     fast-check:
#       uses: chrissbo/platform-golden-paths/.github/workflows/ci-fast-check.yml@<sha>

name: ci-fast-check

on:
  workflow_call:
    inputs:
      go-version:
        description: "Go toolchain version"
        type: string
        default: "1.25.11"
      golangci-lint-version:
        description: "golangci-lint v2 release"
        type: string
        default: "v2.5.0"

permissions:
  contents: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # gitleaks needs history; lint diff-aware also benefits

      - name: setup-go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: fetch centrally pinned lint config
        # The service repo doesn't carry its own .golangci.yml — the golden-paths
        # config is the source of truth. Sparse-checkout the just the config
        # at the pinned SHA so we don't pull untrusted files.
        uses: actions/checkout@v6
        with:
          repository: chrissbo/platform-golden-paths
          ref: main
          path: .golden-paths
          sparse-checkout: |
            config/golangci.yml
          sparse-checkout-cone-mode: false

      - name: install lint config
        run: cp .golden-paths/config/golangci.yml .golangci.yml

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: ${{ inputs.golangci-lint-version }}
          args: --timeout=5m

  secrets:
    name: secrets
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ github.token }}

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup-go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: go test (short, race)
        run: go test -race -short -timeout=4m ./...

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup-go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}
          cache: true

      - name: go build
        run: go build ./...
