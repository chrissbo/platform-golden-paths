# Mode 2 AI review bot — PR-Agent (qodo-ai/pr-agent, Apache-2.0).
#
# Posts inline review comments on every PR using a configurable LLM.
# The workflow is opt-in: it only runs when the caller passes
# `secrets: inherit` and the calling repo has ANTHROPIC_API_KEY set.
# Without the key, this is a no-op (skip step) — the rest of the
# pipeline is unaffected.
#
# This is the Mode 2 row in research/cicd-toolchain/local-simulation-feasibility.md
# §"AI in the developer workflow". It NEVER pushes commits; it only comments.

name: ci-pr-review

on:
  workflow_call:
    secrets:
      ANTHROPIC_API_KEY:
        required: false
  # Also run directly on PRs and PR comments in this repo, so PR-Agent
  # auto-reviews on PR open and responds to /review, /describe, /ask, etc.
  # The caller flow (workflow_call) is what ledger-service uses; these
  # extra triggers are what makes PR-Agent work on platform-golden-paths
  # PRs themselves.
  pull_request:
  issue_comment:

permissions:
  contents: read
  pull-requests: write   # post review comments
  issues: write          # PR-Agent uses the issues API for comments

jobs:
  review:
    name: ai review (pr-agent)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # Run on PR events, and on issue_comment events that are actually on a
    # PR (not a plain issue) — issue_comment.pull_request is non-null only
    # for PR comments. Skip every other case to avoid spurious runs.
    if: >-
      ${{ github.event_name == 'pull_request' ||
          github.event_name == 'workflow_call' ||
          (github.event_name == 'issue_comment' && github.event.issue.pull_request != null) }}
    # 'secrets' is not allowed in if: expressions, so we surface it via env
    # and branch in shell. The actual Anthropic key remains inside env on the
    # one step that needs it.
    env:
      HAS_ANTHROPIC_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' && 'true' || 'false' }}
    steps:
      - name: skip if no anthropic key
        if: ${{ env.HAS_ANTHROPIC_KEY == 'false' }}
        run: |
          echo "::notice::ANTHROPIC_API_KEY not set — skipping PR-Agent review."
          echo "Set the secret at the repo or org level to enable Mode 2 AI review."

      - name: pr-agent review
        if: ${{ env.HAS_ANTHROPIC_KEY == 'true' }}
        # Pinned to qodo-ai/pr-agent v0.36.0 — supply-chain hygiene for an
        # action that runs with secret access. Bump via Renovate / Dependabot.
        uses: qodo-ai/pr-agent@e639d10a4df023b90668ec35796c2457c5f5db8d
        env:
          GITHUB_TOKEN: ${{ github.token }}
          CONFIG.MODEL: anthropic/claude-sonnet-4-5-20250929
          ANTHROPIC.KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Be conservative — review only, no auto-improve commits, no
          # describe-overwrite. We can dial up after we see the noise floor.
          GITHUB_ACTION_CONFIG.AUTO_REVIEW: "true"
          GITHUB_ACTION_CONFIG.AUTO_DESCRIBE: "false"
          GITHUB_ACTION_CONFIG.AUTO_IMPROVE: "false"
          # Disable PR-Agent's ticket-compliance section. Without a real
          # linked ticket it hallucinates "requirements" from the PR body
          # and then judges the diff against its own invention. Misleading
          # noise; "compliance" here means acceptance-criteria compliance,
          # not DORA/MaRisk compliance.
          PR_REVIEWER.REQUIRE_TICKET_ANALYSIS_REVIEW: "false"
          # Append a merge-verdict section to every review. Three states:
          # 🟢 safe to merge / 🟡 have a second look / 🔴 do not merge.
          # PR-Agent runs this through the same prompt as the rest of the
          # review, so the verdict is grounded in the actual diff.
          PR_REVIEWER.EXTRA_INSTRUCTIONS: |
            At the end of every review, add a "Merge verdict" section with one of:
              - 🟢 Safe to merge — low risk, behaviour preserved, no surprises in the diff.
              - 🟡 Have a second look — non-trivial change, edge case, or unclear intent. State specifically what to double-check.
              - 🔴 Do not merge — concrete problem (bug, regression, security issue, breaking change without migration). State the problem.

            Base the verdict on:
              - What the diff actually changes (not what the PR description claims).
              - Whether tests cover the change.
              - Whether the change crosses a stability boundary (major version, public API, security-sensitive code, infra/CI).
              - Whether anything in this repo depends on something the diff removes or renames.

            Be decisive. Default to 🟡 when uncertain, not 🟢.
