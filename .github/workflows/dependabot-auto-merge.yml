# Layer A auto-merge — minor + patch dependency bumps from Dependabot.
#
# What this does:
#   1. Fires only on Dependabot PRs (gated by github.actor).
#   2. Reads the structured update metadata via dependabot/fetch-metadata.
#   3. If every update in the PR is semver-minor or semver-patch, enables
#      GitHub's native auto-merge with the squash strategy. Auto-merge waits
#      for required status checks to pass before actually merging — that's
#      what makes Layer A safe.
#   4. Major bumps (and anything else) are left for human review. We post a
#      single explanatory skip comment per PR. The comment is deduped via a
#      hidden HTML marker so re-runs (e.g. after a Dependabot rebase
#      force-push) don't pile up duplicate comments in the PR thread.
#
# Notes on permissions:
#   - We use 'pull_request_target' because Dependabot PRs otherwise run with
#     read-only GITHUB_TOKEN; pull_request_target runs in the base-branch
#     context which has the elevated permissions auto-merge needs.
#   - Important security caveat: pull_request_target is dangerous if the
#     workflow checks out and runs untrusted PR code. We do NOT check out
#     the PR; we only call the GitHub API. That's safe.
#
# Reference: research/cicd-toolchain/ai-assisted-developer-workflows.md
# §"PR Layer A — Built-in auto-merge with grouping".

name: dependabot-auto-merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write       # required for auto-merge on the base branch
  pull-requests: write  # required to enable auto-merge on the PR

jobs:
  auto-merge:
    name: auto-merge minor/patch
    runs-on: ubuntu-latest
    if: ${{ github.actor == 'dependabot[bot]' }}
    timeout-minutes: 3
    steps:
      - name: fetch dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: enable auto-merge for minor/patch
        # 'update-type' reflects the highest update type in the PR — for a
        # grouped PR with mixed patch and minor bumps it is 'semver-minor',
        # which is what we want.
        if: >-
          ${{ steps.meta.outputs.update-type == 'version-update:semver-minor'
             || steps.meta.outputs.update-type == 'version-update:semver-patch' }}
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh pr merge --auto --squash "$PR_URL"

      - name: post skip comment if not auto-mergeable
        # Major bumps and other update types: leave a one-line note so
        # reviewers know why the bot did not click auto-merge. We dedupe via
        # a hidden HTML marker — if a comment with that marker already
        # exists on this PR, we skip posting a new one. Without dedupe, every
        # Dependabot force-push (recreate, auto-rebase) fires another
        # 'synchronize' event and re-runs this job, piling up duplicates.
        if: >-
          ${{ steps.meta.outputs.update-type != 'version-update:semver-minor'
             && steps.meta.outputs.update-type != 'version-update:semver-patch' }}
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          UPDATE_TYPE: ${{ steps.meta.outputs.update-type }}
          DEP_NAMES: ${{ steps.meta.outputs.dependency-names }}
          PREV_VERSION: ${{ steps.meta.outputs.previous-version }}
          NEW_VERSION: ${{ steps.meta.outputs.new-version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          MARKER="<!-- layer-a-skip-comment -->"

          # Skip if a marker comment already exists on this PR.
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --jq "[.[] | select(.body | contains(\"${MARKER}\"))] | length")
          if [ "${existing}" -gt 0 ]; then
            echo "Skip comment already present on PR #${PR_NUMBER}; not posting again."
            exit 0
          fi

          # Translate the metadata update-type to plain English.
          case "${UPDATE_TYPE}" in
            version-update:semver-major) human_type="major" ;;
            *)                           human_type="${UPDATE_TYPE}" ;;
          esac

          body=$(cat <<EOF
          ${MARKER}
          🤖 **Layer A auto-merge skipped — needs a human reviewer.**

          This PR is a **${human_type}** version bump (\`${PREV_VERSION}\` → \`${NEW_VERSION}\` for \`${DEP_NAMES}\`). Major bumps may include breaking changes, so the bot won't merge them on its own.

          **What a reviewer should do:**
          1. Skim the upstream release notes / changelog (linked in the PR description).
          2. Check whether anything in this repo uses a removed/changed API.
          3. Wait for CI to go green, then merge manually.

          💡 For a summary of the breaking changes, see the PR-Agent review on this PR (Mode 2 in \`research/cicd-toolchain/ai-assisted-developer-workflows.md\`). If no review is present, \`ANTHROPIC_API_KEY\` is not set on the repo — comment \`/review\` once it is.

          *This comment is posted once per PR; force-pushes from Dependabot won't duplicate it.*
          EOF
          )

          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            -f body="${body}" \
            > /dev/null
          echo "Posted skip comment on PR #${PR_NUMBER}."
